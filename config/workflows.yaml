# Workflow templates: which agents run, in what mode, and whether the
# Evaluator runs after the persona to feed governance.
#
# Phase 10 ships sequential mode only and the Evaluator/Critic agents.
# Phase 11 adds coding/execution to the agent lists where applicable;
# Phase 12 expands `mode` beyond sequential.
#
# Persona names are bare (`architect`, not `persona:architect`) as of Phase 10.
# `evaluate: true` appends "evaluator" to `agents` at plan time; absent or
# false skips the judge (preferred for casual/quick workflows where voice
# and latency matter more than confidence scoring).

workflows:
  technical_deep:
    agents: ["architect"]
    mode: sequential
    evaluate: true
  quick_action:
    agents: ["operator"]
    mode: sequential
    evaluate: false
  casual_reply:
    agents: ["casual"]
    mode: sequential
    evaluate: false
  supportive_reply:
    agents: ["casual"]
    mode: sequential
    evaluate: false
  research_brief:
    agents: ["research", "architect"]
    mode: sequential
    evaluate: true
  coding_session:
    agents: ["coding", "architect"]
    mode: sequential
    evaluate: true
  execution_session:
    # Declared but NOT auto-routed in Phase 11. Routing a turn to shell
    # execution on classifier confidence alone belongs behind Phase 15's
    # approval gate. /exec is the only Execution path in Phase 11.
    agents: ["execution", "architect"]
    mode: sequential
    evaluate: false
  debate_then_synthesize:
    agents: ["architect"]
    mode: sequential
    evaluate: true
  speculative_brief:
    agents: ["operator"]
    mode: sequential
    evaluate: false

default_workflow: casual_reply
