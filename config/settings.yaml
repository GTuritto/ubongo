models:
  classifier: openrouter/qwen/qwen-2.5-7b-instruct
  default: openrouter/anthropic/claude-sonnet-4.5
  casual: openrouter/anthropic/claude-haiku-4.5
  compaction: openrouter/anthropic/claude-haiku-4.5
  research: openrouter/anthropic/claude-sonnet-4.5
  evaluator: openrouter/anthropic/claude-sonnet-4.5
  critic: openrouter/anthropic/claude-sonnet-4.5
  coding: openrouter/anthropic/claude-sonnet-4.5
  evolution_generator: openrouter/anthropic/claude-sonnet-4.5

agents:
  research:
    max_tokens: 800
  evaluator:
    max_tokens: 400
  critic:
    max_tokens: 400
  coding:
    max_tokens: 2048
  repair:
    # Max strategies tried per agent failure within one workflow run. Caps
    # cost / latency when a failure is genuinely unrecoverable. The strategy
    # ladder (RepairAgent._STRATEGY_LADDER) is at most 4 entries before
    # ABORT, so 3 covers all kinds except parse_error's full path.
    max_attempts: 3
    # Per-agent fallback model for RETRY_DIFFERENT_MODEL_SAME_PROMPT and
    # the Phase-11 plan_retry shim. Empty entries fall back to models.default
    # (or models.casual for casual).
    fallback_models: {}
    # Per-agent smaller-model override for RETRY_SMALLER_MODEL_SHORTER_PROMPT
    # (cost-bounded last resort). Empty entries fall back to models.casual.
    # Coupled with a ~200-token cap on max_tokens via the same plan.
    smaller_models: {}
    # Per-agent peer replacement for REPLACE_WITH_PEER. null / missing
    # disables (the strategy is skipped, ladder advances to next).
    # 13c defaults: each agent's natural fallback in voice / role.
    peer_replacements:
      # Workers → architect persona; the persona's text quality fills the slot.
      coding: architect
      research: architect
      critic: architect       # smoke 12.4 critic_no_candidate fix
      connector: architect    # candidate 20: a dead MCP server degrades to a normal turn
      # Evaluator + Memory + Execution have no peer: their roles are
      # structurally unique (LLM-as-judge, single-writer, sandbox) and a
      # peer would change the contract, not recover it.
      evaluator: null
      memory: null
      execution: null
      # Personas: rotate between voices when the active one fails.
      architect: operator
      operator: architect
      casual: operator

api_keys:
  openrouter:
    env: OPENROUTER_API_KEY

memory:
  recall_turns: 10
  session_timeout_minutes: 30
  compaction:
    strategy: default
    trigger_at_turns: 15
  embeddings:
    enabled: true
    model: openrouter/openai/text-embedding-3-small
    recall_top_k: 5

vault:
  path: ./vault
  daily_notes_subdir: daily
  # Phase 21: bidirectional sync. When enabled, a polling daemon ingests
  # external edits you make to vault notes (re-embed for recall) and queues
  # edit/write collisions for /conflicts. Off by default; no extra dependency.
  sync:
    enabled: false
    poll_interval_s: 5

# Governance decision-matrix rules live in config/governance.yaml (Phase 14).

evolution:
  enabled: true
  max_calls_per_hour: 30
  population_size: 8
  generations_per_run: 3
  # Phase 17: per-run sample cap for /evaluate. With ~2 LLM calls per
  # (variant, sample), an 8-variant generation at 5 samples is ~80 calls, so
  # under max_calls_per_hour=30 a single /evaluate fully scores ~3 variants and
  # reports the rest skipped. Raise this (or max_calls_per_hour) for fuller runs.
  samples_per_eval: 5
  # Phase 18: top-K variants of a generation that "survive" — the champion
  # among them seeds the next generation (cross-generation lineage).
  survivors: 3
  # Phase 19: the loop proposes a promotion when a generation's champion beats
  # the active baseline's fitness by at least this margin. The user still
  # approves via /improvements; nothing promotes autonomously.
  promotion_margin: 0.05
  # Phase 18: autonomous-loop pacing. null = continuous (bounded only by
  # max_calls_per_hour over a rolling hour); an integer = minimum seconds
  # between cycle starts. The loop starts PAUSED regardless; /evolution resume
  # begins it.
  cron: null
  fitness_weights:
    success_rate: 0.40
    cost_inverse: 0.15
    latency_inverse: 0.10
    hallucination_inverse: 0.20
    user_correction_inverse: 0.15

# Self-authored skills (the self-extension experiment). Ubongo drafts brand-new
# skills; nothing becomes discoverable until the user approves it via
# /skill-candidates. The manual `/author` command works regardless of these
# knobs; they configure the autonomous authoring daemon (Phase 4).
authoring:
  # Phase 4 daemon master switch (the loop comes up PAUSED even when true).
  enabled: true
  # Phase 4: rolling-hour LLM-call budget for the autonomous daemon.
  max_calls_per_hour: 20
  # Phase 4 pacing. null = continuous (bounded by max_calls_per_hour); an int =
  # minimum seconds between draft cycles.
  cron: null
  # Drafting model for /author and the daemon. null = fall back to models.coding.
  model: null
  # Phase 2: held-out samples scored per candidate when evaluating.
  samples_per_eval: 3
  # Phase 3 placeholder: a daemon-drafted candidate is only surfaced for approval
  # when its quality clears this floor.
  promotion_margin: 0.05

# Candidate 20 (v0.1.5, ADR-0016): external MCP servers the Connector agent
# may call. Reached only via /mode connector_session (not auto-routed). Each
# server declares its risk; governance escalates the turn to at least that
# level, and any connector workflow scores irreversible. No secrets here —
# `env:` maps the child's variable names to HOST environment variable names,
# resolved from .env at connect time.
mcp:
  servers: {}
  # Example — the Compendium project on the LAN (uncomment + adjust):
  #   compendium:
  #     transport: http               # http | stdio
  #     url: http://192.168.1.50:9000/mcp
  #     risk: low                     # low | medium | high
  #     enabled: true
  # Example — a local stdio server with a token from .env:
  #   notes:
  #     transport: stdio
  #     command: /usr/local/bin/notes-mcp
  #     args: []
  #     env: { NOTES_TOKEN: MY_NOTES_TOKEN }
  #     risk: medium
  #     enabled: false

# v0.5 phase 04: the Telegram channel (`ubongo telegram`). The bot token is a
# secret and lives in .env (TELEGRAM_BOT_TOKEN), never here. allowed_user_ids
# gates who may drive the bot — an EMPTY list denies everyone (fail-closed);
# put your numeric Telegram user id(s) here. delivery_paused is the minimal
# before_send policy switch (the quiet-hours engine is a later phase).
telegram:
  allowed_user_ids: []
  delivery_paused: false

# v0.7 phase 00: the Signal channel (`ubongo signal`). Unlike Telegram there is no
# token here — the credential is signal-cli's own on-disk keystore. This channel
# talks to a locally-run signal-cli daemon over a JSON-RPC UNIX socket (see
# docs/signal-setup.md to register a dedicated number and start the daemon).
#   account         the dedicated E.164 number this instance is registered as
#   socket          path to the signal-cli daemon's JSON-RPC UNIX socket
#   allowed_numbers who may drive the channel — an EMPTY list denies everyone
#                   (fail-closed); put your own E.164 number(s) here
#   delivery_paused the minimal before_send policy switch (as with Telegram)
signal:
  account: ""
  socket: ""
  allowed_numbers: []
  delivery_paused: false

# v0.5 phase 06: the standing-jobs daemon (proactive output). Boots PAUSED like
# the GP / authoring loops; nothing speaks unprompted until `/jobs resume`. Job
# definitions live in config/jobs.yaml; these are the daemon-wide knobs.
#   quiet_hours    [start, end] local 24h hours; sends inside the window are held
#                  (queued with a future deliver_after) and surface as a catch-up
#   raise_ttl_hours a parked raise auto-declines (default-deny) after this long,
#                  and the job retries on its next schedule
#   max_runs_per_hour  rolling-hour throttle on job cycles
#   cron           null = continuous (tick-paced); int = min seconds between cycles
jobs:
  enabled: true
  cron: 60
  max_runs_per_hour: 20
  raise_ttl_hours: 24
  quiet_hours: [23, 7]

logging:
  level: INFO
  format: json
