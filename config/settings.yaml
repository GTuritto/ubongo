models:
  classifier: openrouter/qwen/qwen-2.5-7b-instruct
  default: openrouter/anthropic/claude-sonnet-4.5
  casual: openrouter/anthropic/claude-haiku-4.5
  compaction: openrouter/anthropic/claude-haiku-4.5
  research: openrouter/anthropic/claude-sonnet-4.5
  evaluator: openrouter/anthropic/claude-sonnet-4.5
  critic: openrouter/anthropic/claude-sonnet-4.5
  coding: openrouter/anthropic/claude-sonnet-4.5
  evolution_generator: openrouter/anthropic/claude-sonnet-4.5

agents:
  research:
    max_tokens: 800
  evaluator:
    max_tokens: 400
  critic:
    max_tokens: 400
  coding:
    max_tokens: 2048
  repair:
    # Max strategies tried per agent failure within one workflow run. Caps
    # cost / latency when a failure is genuinely unrecoverable. The strategy
    # ladder (RepairAgent._STRATEGY_LADDER) is at most 4 entries before
    # ABORT, so 3 covers all kinds except parse_error's full path.
    max_attempts: 3
    # Per-agent fallback model for RETRY_DIFFERENT_MODEL_SAME_PROMPT and
    # the Phase-11 plan_retry shim. Empty entries fall back to models.default
    # (or models.casual for casual).
    fallback_models: {}
    # Per-agent smaller-model override for RETRY_SMALLER_MODEL_SHORTER_PROMPT
    # (cost-bounded last resort). Empty entries fall back to models.casual.
    # Coupled with a ~200-token cap on max_tokens via the same plan.
    smaller_models: {}
    # Per-agent peer replacement for REPLACE_WITH_PEER. null / missing
    # disables (the strategy is skipped, ladder advances to next).
    # 13c defaults: each agent's natural fallback in voice / role.
    peer_replacements:
      # Workers → architect persona; the persona's text quality fills the slot.
      coding: architect
      research: architect
      critic: architect       # smoke 12.4 critic_no_candidate fix
      # Evaluator + Memory + Execution have no peer: their roles are
      # structurally unique (LLM-as-judge, single-writer, sandbox) and a
      # peer would change the contract, not recover it.
      evaluator: null
      memory: null
      execution: null
      # Personas: rotate between voices when the active one fails.
      architect: operator
      operator: architect
      casual: operator

api_keys:
  openrouter:
    env: OPENROUTER_API_KEY

memory:
  recall_turns: 10
  session_timeout_minutes: 30
  compaction:
    strategy: default
    trigger_at_turns: 15
  embeddings:
    enabled: true
    model: openrouter/openai/text-embedding-3-small
    recall_top_k: 5

vault:
  path: ./vault
  daily_notes_subdir: daily

# Governance decision-matrix rules live in config/governance.yaml (Phase 14).

evolution:
  enabled: true
  max_calls_per_hour: 30
  population_size: 8
  generations_per_run: 3
  cron: null
  fitness_weights:
    success_rate: 0.40
    cost_inverse: 0.15
    latency_inverse: 0.10
    hallucination_inverse: 0.20
    user_correction_inverse: 0.15

logging:
  level: INFO
  format: json
