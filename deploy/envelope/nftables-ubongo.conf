#!/usr/sbin/nft -f
# Ubongo egress allowlist — keyed on the dedicated user's UID (ADR-0017).
#
# Loaded once at boot (include from /etc/nftables.conf or copy to
# /etc/nftables.d/ — see INSTALL.md). The address sets start EMPTY and are
# populated by refresh-egress.sh on a timer; until the first refresh the
# ubongo user has loopback + DNS only (fail-closed).
#
# Scope: constrains ONLY packets whose originating socket belongs to the
# `ubongo` user (meta skuid). Rootless Podman networking (pasta/slirp4netns)
# originates container traffic from that user's processes, so container
# egress is covered. Other users on the host are untouched.
#
# Accepted residuals (documented in ADR-0017): DNS for the ubongo UID is open
# to any resolver (a low-bandwidth tunnel in theory — pin `udp dport 53`
# to your resolver's address if you want it tighter), and inbound LAN access
# to the published service ports is unchanged (ADR-0015 posture).

table inet ubongo_egress {
    set allow4 {
        type ipv4_addr
        flags interval
        comment "refresh-egress.sh: resolved A records of allowlisted hosts"
    }

    set allow6 {
        type ipv6_addr
        flags interval
        comment "refresh-egress.sh: resolved AAAA records of allowlisted hosts"
    }

    chain output {
        type filter hook output priority 0; policy accept;

        # Only the ubongo user is enveloped.
        meta skuid != "ubongo" accept

        # Replies on flows we already allowed (and set-rotation stability).
        ct state established,related accept

        # Loopback: the REPL, ubongo-ctl, and the MCP loop-back example.
        oif "lo" accept
        ip daddr 127.0.0.0/8 accept
        ip6 daddr ::1 accept

        # Name resolution (see residuals note above).
        udp dport 53 accept
        tcp dport 53 accept

        # The allowlist: HTTPS to resolved addresses of /etc/ubongo/egress.hosts.
        tcp dport 443 ip daddr @allow4 accept
        tcp dport 443 ip6 daddr @allow6 accept

        # Everything else from the ubongo user: counted, logged, rejected.
        counter log prefix "ubongo-egress-reject " reject
    }
}
